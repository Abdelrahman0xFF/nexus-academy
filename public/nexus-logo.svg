<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f1117;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1d24;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="xGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#9fef00;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6fba00;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect width="200" height="200" rx="38" ry="38" fill="url(#bgGrad)"/>

  <!-- Subtle grid lines for tech feel -->
  <line x1="0" y1="100" x2="200" y2="100" stroke="#9fef00" stroke-width="0.3" stroke-opacity="0.08"/>
  <line x1="100" y1="0" x2="100" y2="200" stroke="#9fef00" stroke-width="0.3" stroke-opacity="0.08"/>

  <!-- Outer hexagon ring (faint) -->
  <polygon
    points="100,18 172,59 172,141 100,182 28,141 28,59"
    fill="none"
    stroke="#9fef00"
    stroke-width="1"
    stroke-opacity="0.15"
  />

  <!-- Inner hexagon ring (faint) -->
  <polygon
    points="100,38 155,69 155,131 100,162 45,131 45,69"
    fill="none"
    stroke="#9fef00"
    stroke-width="0.8"
    stroke-opacity="0.1"
  />

  <!-- Glowing green halo behind X -->
  <ellipse cx="100" cy="100" rx="44" ry="44" fill="#9fef00" fill-opacity="0.07" filter="url(#softglow)"/>

  <!-- The X mark — two bold crossing strokes -->
  <!-- Stroke 1: top-left to bottom-right -->
  <line x1="62" y1="62" x2="138" y2="138"
    stroke="url(#xGrad)"
    stroke-width="18"
    stroke-linecap="round"
    filter="url(#glow)"
  />
  <!-- Stroke 2: top-right to bottom-left -->
  <line x1="138" y1="62" x2="62" y2="138"
    stroke="url(#xGrad)"
    stroke-width="18"
    stroke-linecap="round"
    filter="url(#glow)"
  />

  <!-- Dark center diamond to give X a clean crossing -->
  <rect x="89" y="89" width="22" height="22" rx="2" fill="#0f1117" transform="rotate(45 100 100)"/>

  <!-- Four corner dots (circuit-board feel) -->
  <circle cx="62" cy="62" r="5" fill="#9fef00" fill-opacity="0.85" filter="url(#glow)"/>
  <circle cx="138" cy="62" r="5" fill="#9fef00" fill-opacity="0.85" filter="url(#glow)"/>
  <circle cx="62" cy="138" r="5" fill="#9fef00" fill-opacity="0.85" filter="url(#glow)"/>
  <circle cx="138" cy="138" r="5" fill="#9fef00" fill-opacity="0.85" filter="url(#glow)"/>

  <!-- "NX" small label at bottom -->
  <text
    x="100" y="192"
    font-family="'Georgia', serif"
    font-size="9"
    font-weight="700"
    fill="#9fef00"
    fill-opacity="0.5"
    text-anchor="middle"
    letter-spacing="4"
  >NEXUS</text>
</svg>
